title: Story
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: add_tiles
            field:
              collections:
                - tiles
              type: entries
              display: 'Add Tiles'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: is_vertical
            field:
              type: toggle
              display: 'Vertical Scrolling'
              instructions: 'Toggle between horizontal and vertical scrolling mode.'
              default: false
          -
            handle: parallax
            field:
              type: toggle
              display: 'Parallax Stacking'
              instructions: 'Enable GSAP ScrollTrigger stacking and parallax effects.'
              default: false
