	<script>

		// enable horizontal scrolling
			const scrollContainer = document.querySelector(".horizontal-scroll");

			scrollContainer.addEventListener("wheel", (evt) => {
			evt.preventDefault();

			const horiz = Math.abs(evt.deltaX) > 0 ? evt.deltaX : evt.deltaY;

			scrollContainer.scrollLeft += horiz;
			}, { passive: false });

		// controll playmode with lottie animation
        function setupVisible(animation) {
            const container = animation.wrapper;

            const observer = new IntersectionObserver(
                (entries) => {
                entries.forEach(entry => {
                    const elementHeight = entry.boundingClientRect.height;
                    const visibleHeight = Math.min(entry.intersectionRect.height, window.innerHeight);
                    const visibleScreenRatio = visibleHeight / window.innerHeight;
                    const elementVisibilityRatio = entry.intersectionRatio;

                    // Play if element is at least 50% visible OR covers 40% of viewport height
                    if (entry.isIntersecting && (elementVisibilityRatio > 0.5 || visibleScreenRatio > 0.4)) {
                    animation.play();
                    } else {
                    animation.pause();
                    }
                });
                },
                { threshold: Array.from({length: 101}, (_, i) => i / 100) }
            );

            observer.observe(container);
        }

        function setupClick(animation) {
            var container = animation.wrapper;
            container.style.cursor = 'pointer';
            container.addEventListener('click', () => {
                if (animation.isPaused) animation.play();
                else animation.pause();
            });
        }
	</script>
